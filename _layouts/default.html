<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 24px; line-height: 1.6; background: #000000; color: #ffffff; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #333; padding: 8px 12px; text-align: left; }
    th { background: #111111; }
    code { background: #2d2d2d; color: #ce9178; padding: 2px 6px; border-radius: 3px; }
    pre { background: #111111; color: #ffffff; padding: 16px; border-radius: 6px; overflow-x: auto; }
    a { color: #4ec9b0; }
    h1, h2, h3 { color: #ffffff; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>hljs.highlightAll();</script>
</head>
<body>
  {{ content }}
</body>
</html>
